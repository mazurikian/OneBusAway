name: Android CI

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleObaGoogleDebug

      - name: Rename APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/oba/google/debug/*.apk release/OneBusAway-oba-google-debug.apk

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: OneBusAway-debug-apk
          path: release/OneBusAway-oba-google-debug.apk

      - name: GH Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3.0.0
        with:
          name: OneBusAway ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          prerelease: true
          generate_release_notes: true
          files: release/OneBusAway-oba-google-debug.apk
