name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleObaGoogleDebug

      - name: Rename APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/oba/google/debug/app-oba-google-debug.apk release/OneBusAway-obaGoogle-debug.apk

      - name: GH Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: debug-${{ github.run_number }}
          name: Debug Release #${{ github.run_number }}
          body: |
            Debug APK generado automáticamente.

            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
          prerelease: true
          make_latest: false
          files: |
            release/OneBusAway-obaGoogle-debug.apk
